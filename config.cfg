[mapping]
; 控制模式:
; 1 = 方向 + 线性RT/LT（X控制方向, Y控制RT/LT）
; 2 = 方向 + 按键RT/LT（X控制方向, 鼠标油门键RT=1.0, 鼠标刹车键LT=1.0）
; 3 = 仅线性RT/LT（仅Y控制RT/LT, 不控制方向）
; 4 = 仅按键RT/LT（仅鼠标油门键RT/鼠标刹车键LT, 不控制方向）
control_mode = 2

; 鼠标相对参考点多少像素打满方向/线性RT/LT
reference_range_x_px = 450
reference_range_y_px = 260

; 非零方向输入的起始输出
min_output_x = 0.235

; HUD调试显示: on/off, true/false, 1/0
debug_mode = 1

; HUD刷新帧率(小窗帧率), 范围5~240
hud_fps = 25

; 滚轮换挡按键脉冲时长(ms)
gear_pulse_ms = 45

; ------------------
; 可配置绑定
; ------------------
; 热键写法示例: shift+v, alt+shift+v, f10, ctrl+alt+r
reset_hotkey = f10
toggle_hotkey = shift+v
switch_mode_hotkey = alt+shift+v

; 鼠标按键可选: left, right, middle
gas_mouse_button = right
brake_mouse_button = left

; 虚拟手柄按键可选:
; right_shoulder, left_shoulder, a, b, x, y, dpad_up, dpad_down, dpad_left, dpad_right
gear_up_button = right_shoulder
gear_down_button = left_shoulder

; 相对鼠标模式: 启用后光标持续回中，不受屏幕边界影响
relative_mouse_mode = true

; 启用映射时隐藏光标
hide_cursor_on_enable = true

