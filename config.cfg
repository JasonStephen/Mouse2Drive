[mapping]
; 控制模式:
; 1 = 方向+线性油门刹车（X控制方向, Y控制油门刹车）
; 2 = 方向+按键油门刹车（X控制方向, 右键油门, 左键刹车）
; 3 = 仅线性油门刹车（仅Y控制油门刹车, 不控制方向）
; 4 = 仅按键油门刹车（仅右键油门/左键刹车, 不控制方向）
control_mode = 2

; 鼠标相对参考点多少像素打满方向/线性油门刹车
reference_range_x_px = 450
reference_range_y_px = 260

; 非零方向输入的起始输出（例如0.23）
; 说明: 去掉平台后，输出从该起始值线性增长到1.0
min_output_x = 0.235

; 调试模式: on/off, true/false, 1/0 都可
debug_mode = 1
