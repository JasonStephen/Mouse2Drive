<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>设置</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="layout">
    <aside class="left card">
      <div id="txt-settings-type-title" class="title">设置类型</div>
      <button id="tab-language" class="tab active" type="button">语言</button>
      <button id="tab-mode" class="tab" type="button">控制模式</button>
      <button id="tab-display" class="tab" type="button">图像显示</button>
      <button id="tab-sense" class="tab" type="button">灵敏度</button>
      <button id="tab-bind" class="tab" type="button">按键&映射</button>
    </aside>

    <main class="middle">
      <div class="middle-scroll" id="middle-scroll">
        <section id="page-language" class="page">
          <div class="row">
            <label id="lbl-language" class="lbl">语言</label>
            <select id="language" class="sel">
              <option value="zh-CN">简体中文</option>
              <option value="en-US">English</option>
            </select>
          </div>
        </section>
        <section id="page-mode" class="page hidden">
          <div class="row">
            <label id="lbl-mode_direction_enable" class="lbl">方向控制</label>
            <input id="mode_direction_enable" type="checkbox" />
          </div>
          <div class="row">
            <label id="lbl-mode_linear_pedal_enable" class="lbl">线性油刹</label>
            <input id="mode_linear_pedal_enable" type="checkbox" />
          </div>
          <div class="row">
            <label id="lbl-mode_key_pedal_enable" class="lbl">按键油刹</label>
            <input id="mode_key_pedal_enable" type="checkbox" />
          </div>
        </section>

        <section id="page-display" class="page hidden">
          <div class="row">
            <label id="lbl-fullscreen_mode" class="lbl">全屏模式</label>
            <input id="fullscreen_mode" type="checkbox" />
          </div>
          <div class="row">
            <label id="lbl-window_scale" class="lbl">小窗缩放 (0.8 - 1.5)</label>
            <input id="window_scale" class="inp" />
          </div>
          <div class="row">
            <label id="lbl-fullscreen_scale" class="lbl">全屏缩放 (0.8 - 1.5)</label>
            <input id="fullscreen_scale" class="inp" />
          </div>
          <div class="row">
            <label id="lbl-fullscreen_alpha" class="lbl">全屏透明度 (0 - 1.00)</label>
            <input id="fullscreen_alpha" class="inp" />
            <button id="btn-reset-fullscreen-alpha" class="icon-btn" title="重置" type="button">↺</button>
          </div>
          <div class="row">
            <label id="lbl-hud_fps" class="lbl">HUD FPS</label>
            <select id="hud_fps" class="sel">
              <option value="15">15</option>
              <option value="30">30</option>
              <option value="60">60</option>
              <option value="90">90</option>
              <option value="120">120</option>
            </select>
          </div>
        </section>

        <section id="page-sense" class="page hidden">
          <div class="row">
            <label id="lbl-reference_range_x_ratio" class="lbl">转向灵敏度X比例 (0 - 1)</label>
            <input id="reference_range_x_ratio" class="inp" />
            <button id="btn-reset-ref-x-ratio" class="icon-btn" title="重置" type="button">↺</button>
          </div>
          <div class="row">
            <label id="lbl-reference_range_y_ratio" class="lbl">油刹灵敏度Y比例 (0 - 1)</label>
            <input id="reference_range_y_ratio" class="inp" />
            <button id="btn-reset-ref-y-ratio" class="icon-btn" title="重置" type="button">↺</button>
          </div>
          <div class="row">
            <label id="lbl-min_output_x" class="lbl">非零方向起始输出 (0 - 1)</label>
            <input id="min_output_x" class="inp" />
            <button id="btn-reset-min-output" class="icon-btn" title="重置" type="button">↺</button>
          </div>
          <div class="row">
            <label id="lbl-gear_pulse_ms" class="lbl">换挡脉冲时长 (ms)</label>
            <input id="gear_pulse_ms" class="inp" />
            <button id="btn-reset-gear-pulse" class="icon-btn" title="重置" type="button">↺</button>
          </div>
          <div class="row">
            <label id="lbl-hide_cursor_on_enable" class="lbl">隐藏光标（实验功能）</label>
            <select id="hide_cursor_on_enable" class="sel">
              <option value="true">开启</option>
              <option value="false">关闭</option>
            </select>
            <button id="btn-reset-hide-cursor" class="icon-btn" title="重置" type="button">↺</button>
          </div>
        </section>

        <section id="page-bind" class="page hidden">
          <div id="subttl-function-hotkeys" class="subttl">功能热键</div>
          <div class="row">
            <label id="lbl-toggle_hotkey" class="lbl">开关热键</label>
            <input id="toggle_hotkey" class="inp-hotkey hotkey" readonly />
            <button id="reset-toggle_hotkey" class="icon-btn" title="重置" type="button">↺</button>
          </div>
          <div class="row">
            <label id="lbl-switch_mode_hotkey" class="lbl">切模式热键</label>
            <input id="switch_mode_hotkey" class="inp-hotkey hotkey" readonly />
            <button id="reset-switch_mode_hotkey" class="icon-btn" title="重置" type="button">↺</button>
          </div>
        <div class="row">
          <label id="lbl-toggle_fullscreen_hotkey" class="lbl">全屏热键</label>
          <input id="toggle_fullscreen_hotkey" class="inp-hotkey hotkey" readonly />
          <button id="reset-toggle_fullscreen_hotkey" class="icon-btn" title="重置" type="button">↺</button>
        </div>
        <div class="row">
          <label id="lbl-open_settings_hotkey" class="lbl">打开设置热键</label>
          <input id="open_settings_hotkey" class="inp-hotkey hotkey" readonly />
          <button id="reset-open_settings_hotkey" class="icon-btn" title="重置" type="button">↺</button>
        </div>
          <div id="subttl-mouse-hotkeys" class="subttl">鼠标快捷键</div>
          <div class="row">
            <label id="lbl-gas_mouse_button" class="lbl">油门控制</label>
            <select id="gas_mouse_button" class="sel">
              <option value="right">right</option>
              <option value="left">left</option>
              <option value="middle">middle</option>
              <option value="x1">x1</option>
              <option value="x2">x2</option>
              <option value="wheel_up">wheel_up</option>
              <option value="wheel_down">wheel_down</option>
              <option value="none">none</option>
            </select>
            <button id="reset-gas_mouse_button" class="icon-btn" title="重置" type="button">↺</button>
            <button id="clear-gas_mouse_button" class="icon-btn danger" title="取消绑定" type="button">✕</button>
          </div>
          <div class="row">
            <label id="lbl-brake_mouse_button" class="lbl">刹车控制</label>
            <select id="brake_mouse_button" class="sel">
              <option value="left">left</option>
              <option value="right">right</option>
              <option value="middle">middle</option>
              <option value="x1">x1</option>
              <option value="x2">x2</option>
              <option value="wheel_up">wheel_up</option>
              <option value="wheel_down">wheel_down</option>
              <option value="none">none</option>
            </select>
            <button id="reset-brake_mouse_button" class="icon-btn" title="重置" type="button">↺</button>
            <button id="clear-brake_mouse_button" class="icon-btn danger" title="取消绑定" type="button">✕</button>
          </div>
          <div class="row">
            <label id="lbl-gear_up_mouse_button" class="lbl">升档</label>
            <select id="gear_up_mouse_button" class="sel">
              <option value="right">right</option>
              <option value="left">left</option>
              <option value="middle">middle</option>
              <option value="x1">x1</option>
              <option value="x2">x2</option>
              <option value="wheel_up">wheel_up</option>
              <option value="wheel_down">wheel_down</option>
              <option value="none">none</option>
            </select>
            <button id="reset-gear_up_mouse_button" class="icon-btn" title="重置" type="button">↺</button>
            <button id="clear-gear_up_mouse_button" class="icon-btn danger" title="取消绑定" type="button">✕</button>
          </div>
          <div class="row">
            <label id="lbl-gear_down_mouse_button" class="lbl">降档</label>
            <select id="gear_down_mouse_button" class="sel">
              <option value="right">right</option>
              <option value="left">left</option>
              <option value="middle">middle</option>
              <option value="x1">x1</option>
              <option value="x2">x2</option>
              <option value="wheel_down">wheel_down</option>
              <option value="wheel_up">wheel_up</option>
              <option value="none">none</option>
            </select>
            <button id="reset-gear_down_mouse_button" class="icon-btn" title="重置" type="button">↺</button>
            <button id="clear-gear_down_mouse_button" class="icon-btn danger" title="取消绑定" type="button">✕</button>
          </div>

          <div id="subttl-mapping" class="subttl">映射</div>
          <div class="row">
            <label id="lbl-steering_axis" class="lbl">转向映射轴</label>
            <select id="steering_axis" class="sel">
              <option value="left_x">left_x</option>
              <option value="left_y">left_y</option>
              <option value="right_x">right_x</option>
              <option value="right_y">right_y</option>
              <option value="left_trigger">left_trigger</option>
              <option value="right_trigger">right_trigger</option>
              <option value="none">none</option>
            </select>
            <button id="reset-steering_axis" class="icon-btn" title="重置" type="button">↺</button>
            <button id="clear-steering_axis" class="icon-btn danger" title="取消绑定" type="button">✕</button>
          </div>
          <div id="subttl-pedal-mapping" class="subttl">油刹映射</div>
          <div class="row">
            <label id="lbl-gas_brake_mapping_mode" class="lbl">油刹映射模式</label>
            <select id="gas_brake_mapping_mode" class="sel">
              <option value="gamepad">手柄映射</option>
              <option value="keyboard">键盘映射</option>
            </select>
            <button id="reset-gas_brake_mapping_mode" class="icon-btn" title="重置" type="button">↺</button>
            <button id="clear-gas_brake_mapping_mode" class="icon-btn danger" title="取消绑定" type="button">✕</button>
          </div>
          <div id="pedal-gamepad-group">
          <div class="row">
            <label id="lbl-gas_output_button" class="lbl">油门映射</label>
            <select id="gas_output_button" class="sel">
              <option value="right_shoulder">right_shoulder</option>
              <option value="left_shoulder">left_shoulder</option>
              <option value="left_thumb">left_thumb</option>
              <option value="right_thumb">right_thumb</option>
              <option value="back">back</option>
              <option value="start">start</option>
              <option value="guide">guide</option>
              <option value="a">a</option>
              <option value="b">b</option>
              <option value="x">x</option>
              <option value="y">y</option>
              <option value="dpad_up">dpad_up</option>
              <option value="dpad_down">dpad_down</option>
              <option value="dpad_left">dpad_left</option>
              <option value="dpad_right">dpad_right</option>
              <option value="none">none</option>
            </select>
            <button id="reset-gas_output_button" class="icon-btn" title="重置" type="button">↺</button>
            <button id="clear-gas_output_button" class="icon-btn danger" title="取消绑定" type="button">✕</button>
          </div>
          <div class="row">
            <label id="lbl-brake_output_button" class="lbl">刹车映射</label>
            <select id="brake_output_button" class="sel">
              <option value="left_shoulder">left_shoulder</option>
              <option value="right_shoulder">right_shoulder</option>
              <option value="left_thumb">left_thumb</option>
              <option value="right_thumb">right_thumb</option>
              <option value="back">back</option>
              <option value="start">start</option>
              <option value="guide">guide</option>
              <option value="a">a</option>
              <option value="b">b</option>
              <option value="x">x</option>
              <option value="y">y</option>
              <option value="dpad_up">dpad_up</option>
              <option value="dpad_down">dpad_down</option>
              <option value="dpad_left">dpad_left</option>
              <option value="dpad_right">dpad_right</option>
              <option value="none">none</option>
            </select>
            <button id="reset-brake_output_button" class="icon-btn" title="重置" type="button">↺</button>
            <button id="clear-brake_output_button" class="icon-btn danger" title="取消绑定" type="button">✕</button>
          </div>
          </div>
          <div id="pedal-keyboard-group" class="hidden">
            <div class="row">
              <label id="lbl-gas_key" class="lbl">油门</label>
              <input id="gas_key" class="inp-hotkey hotkey" readonly />
              <button id="reset-gas_key" class="icon-btn" title="重置" type="button">↺</button>
              <button id="clear-gas_key" class="icon-btn danger" title="取消绑定" type="button">✕</button>
            </div>
            <div class="row">
              <label id="lbl-brake_key" class="lbl">刹车</label>
              <input id="brake_key" class="inp-hotkey hotkey" readonly />
              <button id="reset-brake_key" class="icon-btn" title="重置" type="button">↺</button>
              <button id="clear-brake_key" class="icon-btn danger" title="取消绑定" type="button">✕</button>
            </div>
          </div>
          <div id="subttl-gear-control" class="subttl">升降档控制</div>
          <div class="row">
            <label id="lbl-gear_mapping_mode" class="lbl">升降档映射模式</label>
            <select id="gear_mapping_mode" class="sel">
              <option value="gamepad">手柄映射</option>
              <option value="keyboard">键盘映射</option>
            </select>
            <button id="reset-gear_mapping_mode" class="icon-btn" title="重置" type="button">↺</button>
            <button id="clear-gear_mapping_mode" class="icon-btn danger" title="取消绑定" type="button">✕</button>
          </div>

          <div id="gear-gamepad-group">
            <div class="row">
              <label id="lbl-gear_up_button" class="lbl">升档</label>
              <select id="gear_up_button" class="sel">
                <option value="none">none</option>
                <option value="right_shoulder">right_shoulder</option>
                <option value="left_shoulder">left_shoulder</option>
                <option value="left_thumb">left_thumb</option>
                <option value="right_thumb">right_thumb</option>
                <option value="back">back</option>
                <option value="start">start</option>
                <option value="guide">guide</option>
                <option value="a">a</option>
                <option value="b">b</option>
                <option value="x">x</option>
                <option value="y">y</option>
                <option value="dpad_up">dpad_up</option>
                <option value="dpad_down">dpad_down</option>
                <option value="dpad_left">dpad_left</option>
                <option value="dpad_right">dpad_right</option>
              </select>
              <button id="reset-gear_up_button" class="icon-btn" title="重置" type="button">↺</button>
              <button id="clear-gear_up_button" class="icon-btn danger" title="取消绑定" type="button">✕</button>
            </div>
            <div class="row">
              <label id="lbl-gear_down_button" class="lbl">降档</label>
              <select id="gear_down_button" class="sel">
                <option value="none">none</option>
                <option value="left_shoulder">left_shoulder</option>
                <option value="right_shoulder">right_shoulder</option>
                <option value="left_thumb">left_thumb</option>
                <option value="right_thumb">right_thumb</option>
                <option value="back">back</option>
                <option value="start">start</option>
                <option value="guide">guide</option>
                <option value="a">a</option>
                <option value="b">b</option>
                <option value="x">x</option>
                <option value="y">y</option>
                <option value="dpad_up">dpad_up</option>
                <option value="dpad_down">dpad_down</option>
                <option value="dpad_left">dpad_left</option>
                <option value="dpad_right">dpad_right</option>
              </select>
              <button id="reset-gear_down_button" class="icon-btn" title="重置" type="button">↺</button>
              <button id="clear-gear_down_button" class="icon-btn danger" title="取消绑定" type="button">✕</button>
            </div>
          </div>

          <div id="gear-keyboard-group" class="hidden">
            <div class="row">
              <label id="lbl-gear_up_key" class="lbl">升档</label>
              <input id="gear_up_key" class="inp-hotkey hotkey" readonly />
              <button id="reset-gear_up_key" class="icon-btn" title="重置" type="button">↺</button>
              <button id="clear-gear_up_key" class="icon-btn danger" title="取消绑定" type="button">✕</button>
            </div>
            <div class="row">
              <label id="lbl-gear_down_key" class="lbl">降档</label>
              <input id="gear_down_key" class="inp-hotkey hotkey" readonly />
              <button id="reset-gear_down_key" class="icon-btn" title="重置" type="button">↺</button>
              <button id="clear-gear_down_key" class="icon-btn danger" title="取消绑定" type="button">✕</button>
            </div>
          </div>
        </section>
      </div>

      <div class="actions">
        <button id="btn-reset-all" class="btn b-neutral" type="button">全部重置</button>
        <button id="btn-apply" class="btn b-apply" type="button">应用</button>
        <button id="btn-confirm" class="btn b-confirm" type="button">确认并应用</button>
        <button id="btn-close" class="btn b-neutral" type="button">关闭</button>
      </div>
    </main>

    <aside class="right card">
      <div id="txt-detail-title" class="title">提示详情</div>
      <div class="detail-scroll">
        <div id="detail" class="detail">这是图像显示的提示详情，目前为空</div>
      </div>
    </aside>
  </div>

  <script src="./bootstrap_state.js"></script>
  <script src="./app.js"></script>
</body>
</html>
