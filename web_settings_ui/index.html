<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>设置</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="layout">
    <aside class="left card">
      <div class="title">设置类型</div>
      <button id="tab-display" class="tab active" type="button">图像显示</button>
      <button id="tab-sense" class="tab" type="button">灵敏度</button>
      <button id="tab-bind" class="tab" type="button">快捷键</button>
    </aside>

    <main class="middle">
      <section id="page-display" class="page">
        <div class="row">
          <label id="lbl-window_scale" class="lbl">小窗缩放 (0.8 - 1.5)</label>
          <input id="window_scale" class="inp" />
        </div>
        <div class="row">
          <label id="lbl-fullscreen_scale" class="lbl">全屏缩放 (0.8 - 1.5)</label>
          <input id="fullscreen_scale" class="inp" />
        </div>
        <div class="row">
          <label id="lbl-hud_fps" class="lbl">HUD FPS</label>
          <select id="hud_fps" class="sel">
            <option value="15">15</option>
            <option value="30">30</option>
            <option value="60">60</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>
      </section>

      <section id="page-sense" class="page hidden">
        <div class="row">
          <label id="lbl-min_output_x" class="lbl">非零方向起始输出 (0 - 1)</label>
          <input id="min_output_x" class="inp" />
          <button id="btn-reset" class="btn b-neutral" type="button">重置</button>
        </div>
        <div class="row">
          <label id="lbl-gear_pulse_ms" class="lbl">换挡脉冲时长 (ms)</label>
          <input id="gear_pulse_ms" class="inp" />
          <button id="btn-reset-gear-pulse" class="btn b-neutral" type="button">重置</button>
        </div>
        <div class="row">
          <label id="lbl-hide_cursor_on_enable" class="lbl">隐藏光标（实验功能）</label>
          <select id="hide_cursor_on_enable" class="sel">
            <option value="true">开启</option>
            <option value="false">关闭</option>
          </select>
        </div>
      </section>

      <section id="page-bind" class="page hidden">
        <div class="subttl">快捷键</div>
        <div class="row">
          <label id="lbl-toggle_hotkey" class="lbl">开关热键</label>
          <input id="toggle_hotkey" class="inp-wide hotkey" readonly />
          <button id="reset-toggle_hotkey" class="btn b-neutral" type="button">重置</button>
        </div>
        <div class="row">
          <label id="lbl-switch_mode_hotkey" class="lbl">切模式热键</label>
          <input id="switch_mode_hotkey" class="inp-wide hotkey" readonly />
          <button id="reset-switch_mode_hotkey" class="btn b-neutral" type="button">重置</button>
        </div>
        <div class="row">
          <label id="lbl-toggle_fullscreen_hotkey" class="lbl">全屏热键</label>
          <input id="toggle_fullscreen_hotkey" class="inp-wide hotkey" readonly />
          <button id="reset-toggle_fullscreen_hotkey" class="btn b-neutral" type="button">重置</button>
        </div>
        <div class="subttl">映射</div>
        <div class="row">
          <label id="lbl-control_mode" class="lbl">方向控制模式</label>
          <select id="control_mode" class="sel">
            <option value="1">模式1 方向+线性油刹</option>
            <option value="2">模式2 方向+按键油刹</option>
            <option value="3">模式3 仅线性油刹</option>
            <option value="4">模式4 仅按键油刹</option>
          </select>
        </div>
        <div class="row">
          <label id="lbl-steering_axis" class="lbl">转向映射轴</label>
          <select id="steering_axis" class="sel">
            <option value="left_x">left_x</option>
            <option value="left_y">left_y</option>
            <option value="right_x">right_x</option>
            <option value="right_y">right_y</option>
          </select>
        </div>
        <div class="row">
          <label id="lbl-gear_mapping_mode" class="lbl">升降档映射模式</label>
          <select id="gear_mapping_mode" class="sel">
            <option value="gamepad">手柄映射</option>
            <option value="keyboard">键盘映射</option>
          </select>
        </div>
        <div class="row">
          <label id="lbl-gear_up_button" class="lbl">升档（手柄）</label>
          <select id="gear_up_button" class="sel">
            <option value="right_shoulder">right_shoulder</option>
            <option value="left_shoulder">left_shoulder</option>
            <option value="left_thumb">left_thumb</option>
            <option value="right_thumb">right_thumb</option>
            <option value="back">back</option>
            <option value="start">start</option>
            <option value="guide">guide</option>
            <option value="a">a</option>
            <option value="b">b</option>
            <option value="x">x</option>
            <option value="y">y</option>
            <option value="dpad_up">dpad_up</option>
            <option value="dpad_down">dpad_down</option>
            <option value="dpad_left">dpad_left</option>
            <option value="dpad_right">dpad_right</option>
          </select>
        </div>
        <div class="row">
          <label id="lbl-gear_down_button" class="lbl">降档（手柄）</label>
          <select id="gear_down_button" class="sel">
            <option value="left_shoulder">left_shoulder</option>
            <option value="right_shoulder">right_shoulder</option>
            <option value="left_thumb">left_thumb</option>
            <option value="right_thumb">right_thumb</option>
            <option value="back">back</option>
            <option value="start">start</option>
            <option value="guide">guide</option>
            <option value="a">a</option>
            <option value="b">b</option>
            <option value="x">x</option>
            <option value="y">y</option>
            <option value="dpad_up">dpad_up</option>
            <option value="dpad_down">dpad_down</option>
            <option value="dpad_left">dpad_left</option>
            <option value="dpad_right">dpad_right</option>
          </select>
        </div>
        <div class="row">
          <label id="lbl-gear_up_key" class="lbl">升档（键盘）</label>
          <select id="gear_up_key" class="sel">
            <option value="e">e</option>
            <option value="q">q</option>
            <option value="r">r</option>
            <option value="f">f</option>
            <option value="up">up</option>
            <option value="page_up">page_up</option>
          </select>
        </div>
        <div class="row">
          <label id="lbl-gear_down_key" class="lbl">降档（键盘）</label>
          <select id="gear_down_key" class="sel">
            <option value="q">q</option>
            <option value="e">e</option>
            <option value="c">c</option>
            <option value="v">v</option>
            <option value="down">down</option>
            <option value="page_down">page_down</option>
          </select>
        </div>
      </section>

      <div class="actions">
        <button id="btn-reset-all" class="btn b-neutral" type="button">全部重置</button>
        <button id="btn-apply" class="btn b-apply" type="button">应用</button>
        <button id="btn-confirm" class="btn b-confirm" type="button">确认并应用</button>
        <button id="btn-close" class="btn b-neutral" type="button">关闭</button>
      </div>
    </main>

    <aside class="right card">
      <div class="title">提示详情</div>
      <div id="detail" class="detail">这是图像显示的提示详情，目前为空</div>
    </aside>
  </div>

  <script src="./app.js"></script>
</body>
</html>
